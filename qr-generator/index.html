<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <title>Smart QR-Code Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body>

<div class="container">
    <h1>Smart QR-Code Generator</h1>

    <label for="text">Text / URL</label>
    <textarea id="text" rows="3" placeholder="https://example.com"></textarea>

    <div class="options">
        <div>
            <label for="size">Größe (px)</label>
            <input type="number" id="size" value="256" min="100" max="512" />
        </div>

        <div>
            <label for="color">Farbe</label>
            <input type="color" id="color" value="#000000" />
        </div>

        <div>
            <label for="bgColor">Hintergrund</label>
            <input type="color" id="bgColor" value="#ffffff" />
        </div>
    </div>

    <button onclick="generateQR()">QR-Code generieren</button>

    <canvas id="qrCanvas"></canvas>

    <div class="download">
        <button onclick="downloadQR()">Als PNG herunterladen</button>
    </div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
